# Render blueprint for the Atlas FastAPI backend.
#
# Secrets are set in the service's Environment tab, not here: GEMINI_API_KEY_4
# through GEMINI_API_KEY_12, TAVILY_API_KEY, LANGFUSE_PUBLIC_KEY,
# LANGFUSE_SECRET_KEY, LANGFUSE_HOST. After deploy, point the frontend's
# NEXT_PUBLIC_API_URL at the service URL.
#
# The free plan sleeps after ~15 min idle, so the first request after a nap
# takes ~30-60s to wake up.

services:
  - type: web
    name: atlas-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALLOWED_ORIGINS
        value: "*"
