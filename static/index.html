<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atlas — multi-agent researcher</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{--bg:#0b0e14;--panel:#11151f;--border:#232a39;--text:#e6e9ef;--muted:#8b93a7;--accent:#7c6cff;--accent2:#5b8def;}
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
  a{color:var(--accent2);}
  .wrap{max-width:820px;margin:0 auto;padding:56px 20px 90px;}
  h1{font-size:42px;margin:0 0 6px;}
  .sub{color:var(--muted);margin:0 0 28px;line-height:1.55;max-width:640px;}
  .bar{display:flex;gap:10px;}
  .bar input{flex:1;padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:15px;outline:none;}
  .bar input:focus{border-color:var(--accent);}
  .bar button{padding:0 24px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:600;}
  .bar button:disabled{opacity:.55;cursor:default;}
  .examples{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
  .chip{background:var(--panel);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer;}
  .chip:hover{border-color:var(--accent);color:var(--text);}
  .error{margin-top:18px;padding:12px 14px;border-radius:10px;background:#2a1620;border:1px solid #5e2a3a;color:#ffb4c4;}
  .card{margin-top:28px;padding:16px 20px;background:var(--panel);border:1px solid var(--border);border-radius:12px;}
  .card h3{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);}
  .step{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;color:#c4cbd9;padding:3px 0;}
  .step::before{content:"\203A ";color:var(--accent);}
  .pulse{color:var(--accent);animation:pulse 1.2s infinite;}
  @keyframes pulse{50%{opacity:.4;}}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .stats span{font-size:13px;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:5px 12px;border-radius:20px;}
  .md{line-height:1.65;}
  .md h1,.md h2,.md h3{line-height:1.3;margin-top:1.2em;}
  .md code{background:var(--bg);padding:2px 6px;border-radius:5px;font-size:13px;}
  .trace{margin-top:18px;font-size:14px;}
</style>
</head>
<body>
<main class="wrap">
  <h1>🧭 Atlas</h1>
  <p class="sub">A multi-agent researcher. It plans, searches the web, reads sources, synthesizes, writes a <strong>cited</strong> brief, and critiques itself until it's good enough.</p>
  <div class="bar">
    <input id="goal" placeholder="Ask Atlas to research something…" autocomplete="off" />
    <button id="go">Research</button>
  </div>
  <div class="examples" id="examples"></div>
  <div id="error"></div>
  <section class="card" id="steps-card" style="display:none">
    <h3>Agents at work</h3>
    <div id="steps"></div>
  </section>
  <section class="card" id="result-card" style="display:none">
    <h3>Research brief</h3>
    <div class="stats" id="stats"></div>
    <article class="md" id="brief"></article>
    <p class="trace" id="trace"></p>
  </section>
</main>
<script>
  const EXAMPLES = [
    "Compare LangGraph and CrewAI for building multi-agent systems",
    "What are the tradeoffs of RAG vs fine-tuning for domain QA?",
    "What is the current state of AI agent frameworks in 2026?"
  ];
  const $ = (id) => document.getElementById(id);
  let running = false, done = false;

  EXAMPLES.forEach((ex) => {
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = ex;
    b.onclick = () => research(ex);
    $("examples").appendChild(b);
  });

  function renderMd(src) {
    if (window.marked && marked.parse) {
      return marked.parse(src).replace(/<a /g, '<a target="_blank" rel="noreferrer" ');
    }
    const d = document.createElement("div");
    d.textContent = src;
    return d.innerHTML;
  }

  function research(q) {
    const query = (q ?? $("goal").value).trim();
    if (!query || running) return;
    $("goal").value = query;
    running = true; done = false;
    $("go").disabled = true; $("go").textContent = "Researching…";
    $("error").innerHTML = "";
    $("examples").style.display = "none";
    $("result-card").style.display = "none";
    $("steps").innerHTML = "";
    $("steps-card").style.display = "block";
    const pulse = document.createElement("div");
    pulse.className = "step pulse"; pulse.id = "pulse"; pulse.textContent = "working…";
    $("steps").appendChild(pulse);

    const es = new EventSource("/research?goal=" + encodeURIComponent(query));
    es.addEventListener("step", (e) => {
      const data = JSON.parse(e.data);
      const d = document.createElement("div");
      d.className = "step"; d.textContent = data.message;
      $("steps").insertBefore(d, $("pulse"));
    });
    es.addEventListener("done", (e) => {
      done = true; running = false;
      const r = JSON.parse(e.data);
      const p = $("pulse"); if (p) p.remove();
      $("go").disabled = false; $("go").textContent = "Research";
      $("stats").innerHTML =
        `<span>${r.sources} sources</span><span>${r.evidence_count} facts</span>` +
        `<span>${r.revisions} revisions</span><span>${r.steps} steps</span>`;
      $("brief").innerHTML = renderMd(r.draft || "_(no brief produced)_");
      $("trace").innerHTML = r.trace_url
        ? `🔗 <a href="${r.trace_url}" target="_blank" rel="noreferrer">View the full agent trace in Langfuse</a>`
        : "";
      $("result-card").style.display = "block";
      es.close();
    });
    es.addEventListener("error", (e) => {
      if (done) return;
      const p = $("pulse"); if (p) p.remove();
      running = false; $("go").disabled = false; $("go").textContent = "Research";
      let msg = "Could not reach the backend. (On Render's free tier the first request can take ~50s to wake the server — try again.)";
      if (e.data) { try { msg = JSON.parse(e.data).message || msg; } catch (_) {} }
      $("error").innerHTML = `<div class="error">${msg}</div>`;
      es.close();
    });
  }

  $("go").onclick = () => research();
  $("goal").addEventListener("keydown", (e) => { if (e.key === "Enter") research(); });
</script>
</body>
</html>
